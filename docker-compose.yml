version: "3.8"

services:
  postgres:
    image: postgres:18-alpine
    container_name: todos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-todos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-todos_password}
      POSTGRES_DB: ${DB_NAME:-hummingbird_todos}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-todos_user} -d ${DB_NAME:-hummingbird_todos}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: todos-valkey
    restart: unless-stopped
    ports:
      - "${CACHE_PORT:-6379}:6379"
    command: valkey-server --maxmemory 100mb --maxmemory-policy allkeys-lfu
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  swift-api:
    build:
      context: ./swift-api
      dockerfile: Dockerfile
    container_name: todos-swift-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-todos_user}
      - DB_PASSWORD=${DB_PASSWORD:-todos_password}
      - DB_NAME=${DB_NAME:-hummingbird_todos}
      - CACHE_HOST=valkey
      - CACHE_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  go-api:
    build:
      context: ./go-api
      dockerfile: Dockerfile
    container_name: todos-go-api
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-todos_user}
      - DB_PASSWORD=${DB_PASSWORD:-todos_password}
      - DB_NAME=${DB_NAME:-hummingbird_todos}
      - CACHE_HOST=valkey
      - CACHE_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - BASE_URL=${BASE_URL:-http://localhost:8081}
      - PORT=8081
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  bun-api:
    build:
      context: ./bun-api
      dockerfile: Dockerfile
    container_name: todos-bun-api
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-todos_user}
      - DB_PASSWORD=${DB_PASSWORD:-todos_password}
      - DB_NAME=${DB_NAME:-hummingbird_todos}
      - CACHE_HOST=valkey
      - CACHE_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - BASE_URL=${BUN_BASE_URL:-http://localhost:8082}
      - PORT=8082
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

volumes:
  postgres_data:
  valkey_data:
